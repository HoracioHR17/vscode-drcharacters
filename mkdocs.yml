site_name: Deltarune Characters for VS Code
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Characters: pets.md
  - Themes: themes.md
  - Credits: credits.md
  - Contributing: contributing.md

theme:
  name: material
  features:
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - admonition
  - pymdownx.details
